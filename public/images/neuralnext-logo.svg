<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-labelledby="title desc">
  <title id="title">NeuralNext AI Solutions main logo</title>
  <desc id="desc">Dark circular NeuralNext logo with a neon purple-to-blue ring and glossy gradient N mark.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="68%">
      <stop offset="0%" stop-color="#1e1754"/>
      <stop offset="50%" stop-color="#10143a"/>
      <stop offset="100%" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="ring" x1="8%" y1="10%" x2="92%" y2="90%">
      <stop offset="0%" stop-color="#bd28ff"/>
      <stop offset="46%" stop-color="#7257ff"/>
      <stop offset="72%" stop-color="#0078ff"/>
      <stop offset="100%" stop-color="#09e6ff"/>
    </linearGradient>
    <linearGradient id="tube" x1="16%" y1="12%" x2="88%" y2="88%">
      <stop offset="0%" stop-color="#ff7aff"/>
      <stop offset="22%" stop-color="#8d22ff"/>
      <stop offset="55%" stop-color="#2b35ff"/>
      <stop offset="82%" stop-color="#0098ff"/>
      <stop offset="100%" stop-color="#25f4ff"/>
    </linearGradient>
    <linearGradient id="tubeDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#331160"/>
      <stop offset="45%" stop-color="#17105f"/>
      <stop offset="100%" stop-color="#022b74"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".95"/>
      <stop offset="38%" stop-color="#f7d8ff" stop-opacity=".78"/>
      <stop offset="70%" stop-color="#89ecff" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity=".18"/>
    </linearGradient>
    <filter id="softGlow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="1.35" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.34  0 0 0 0 0.05  0 0 0 0 1  0 0 0 .82 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ringGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="0.85" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="24.0" cy="24.0" r="22.6"/>
    </clipPath>
  </defs>
  <rect width="48" height="48" fill="none"/>
  <g clip-path="url(#circleClip)">
    <circle cx="24.0" cy="24.0" r="22.6" fill="url(#bg)"/>
    <circle cx="24.0" cy="24.0" r="20.4" fill="#0b1030" opacity=".55"/>
    <path d="M 9.0 37.0 C 14.0 42.0 30.0 45.0 40.0 33.0" fill="none" stroke="#0048ff" stroke-width="1.15" opacity=".22"/>
  </g>
  <circle cx="24.0" cy="24.0" r="22.25" fill="none" stroke="url(#ring)" stroke-width="1.55" filter="url(#ringGlow)"/>
  <circle cx="24.0" cy="24.0" r="20.85" fill="none" stroke="#ffffff" stroke-width="0.22" opacity=".18"/>
  <g filter="url(#softGlow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 16.4 33.8 L 16.4 15.1" stroke="url(#tubeDark)" stroke-width="9.6" opacity=".86"/>
    <path d="M 31.6 14.9 L 31.6 33.3" stroke="url(#tubeDark)" stroke-width="9.6" opacity=".86"/>
    <path d="M 16.45 15.2 L 31.55 33.2" stroke="url(#tubeDark)" stroke-width="10.1" opacity=".88"/>
    <path d="M 16.2 33.3 L 16.2 15.0" stroke="url(#tube)" stroke-width="8.35"/>
    <path d="M 31.8 15.0 L 31.8 33.3" stroke="url(#tube)" stroke-width="8.35"/>
    <path d="M 16.2 15.0 L 31.8 33.3" stroke="url(#tube)" stroke-width="8.65"/>
    <path d="M 14.55 33.0 L 14.55 15.6" stroke="url(#highlight)" stroke-width="1.05" opacity=".88"/>
    <path d="M 30.15 15.7 L 30.15 32.2" stroke="url(#highlight)" stroke-width="1.05" opacity=".84"/>
    <path d="M 14.9 14.35 L 31.05 32.7" stroke="url(#highlight)" stroke-width="1.0" opacity=".82"/>
    <path d="M 16.2 33.3 L 16.2 15.0" stroke="#ffffff" stroke-width="0.34" opacity=".5"/>
    <path d="M 31.8 15.0 L 31.8 33.3" stroke="#bff7ff" stroke-width="0.34" opacity=".5"/>
    <path d="M 16.2 15.0 L 31.8 33.3" stroke="#d7faff" stroke-width="0.38" opacity=".42"/>
  </g>
</svg>
